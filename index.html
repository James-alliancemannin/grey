    <script>
        // Tailwind init
        tailwind.config = { content: ["./**/*.{html,js}"] };

        // ====================== THREE.JS ELITE SCENE ======================
        let scene, camera, renderer;
        let particles = [];
        let lines = [];
        const particleCount = 1800;
        const connectionDistance = 140;

        function initThree() {
            const canvas = document.getElementById('three-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.z = 900;

            // Particles
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                const radius = 800 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i]     = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);

                const color = new THREE.Color(0x14f3c8);
                colors[i]     = color.r;
                colors[i + 1] = color.g;
                colors[i + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 3.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            particles = points;

            // Lines (signal network)
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x14f3c8,
                transparent: true,
                opacity: 0.12
            });

            const linePositions = [];
            for (let i = 0; i < particleCount; i += 12) {
                const lineGeo = new THREE.BufferGeometry();
                const start = particles.geometry.attributes.position.array;
                const idx = i * 3;
                linePositions.push(
                    start[idx], start[idx+1], start[idx+2],
                    start[idx+30] || start[idx], 
                    start[idx+31] || start[idx+1], 
                    start[idx+32] || start[idx+2]
                );
                const line = new THREE.Line(lineGeo, lineMaterial);
                scene.add(line);
                lines.push(line);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Mouse interaction
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            animateThree(mouseX, mouseY);
        }

        function animateThree(mx, my) {
            requestAnimationFrame(() => animateThree(mx, my));

            particles.rotation.y += 0.0003;
            camera.position.x = mx * 120;
            camera.position.y = my * 80;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        // Boot Three.js
        window.addEventListener('load', () => {
            initThree();
            // Rest of your existing JS (articles render, search, etc.) remains unchanged
            console.log('%cconspiracy.im — elite archive initialized', 'color:#14f3c8; font-family:monospace');
        });
    </script>
